name: Release

on:
  push:
    tags: ["v*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            artifact: linux
          - os: macos-latest
            name: macOS
            artifact: mac

    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bison libncurses-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bison ncurses

      - name: Build
        run: make

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: sc-${{ matrix.artifact }}
          path: bin/${{ matrix.artifact }}/sc/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v5
        with:
          name: sc-linux
          path: artifacts/linux/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v5
        with:
          name: sc-mac
          path: artifacts/mac/

      - name: Create archives
        run: |
          cd artifacts
          tar czf sc-${{ github.ref_name }}-linux.tar.gz linux/
          tar czf sc-${{ github.ref_name }}-mac.tar.gz mac/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/sc-${{ github.ref_name }}-linux.tar.gz
            artifacts/sc-${{ github.ref_name }}-mac.tar.gz
