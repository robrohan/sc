name: Build

on:
  push:
    branches: ["main"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            artifact: linux
            binpath: bin/linux/sc/
          - os: macos-latest
            name: macOS arm64
            artifact: mac-arm64
            binpath: bin/mac/sc/
          - os: macos-13
            name: macOS x86_64
            artifact: mac-x86_64
            binpath: bin/mac/sc/

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bison libncurses-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bison ncurses

      - name: Build
        run: make

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: sc-${{ matrix.artifact }}
          path: ${{ matrix.binpath }}
          if-no-files-found: error
