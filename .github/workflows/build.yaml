name: Build

on:
  push:
    branches: ["main"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            artifact: linux
            binpath: bin/linux/sc/
            build_cmd: make
          - os: macos-latest
            name: macOS arm64
            artifact: mac-arm64
            binpath: bin/mac/sc/
            build_cmd: make
          - os: macos-latest
            name: macOS x86_64
            artifact: mac-x86_64
            binpath: bin/mac/sc/
            build_cmd: make CC=clang CFLAGS="-arch x86_64 -DSYSV3 -O2 -pipe" LDFLAGS="-arch x86_64" LIB="-lm -lncurses"

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bison libncurses-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bison

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: sc-${{ matrix.artifact }}
          path: ${{ matrix.binpath }}
          if-no-files-found: error
